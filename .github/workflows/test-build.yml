name: Test Build

# Тестовый workflow для проверки сборки без создания релиза
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-build-linux:
    name: Test Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      
      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      
      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Build frontend
        working-directory: ./anycode
        run: pnpm build
      
      - name: Verify frontend build
        working-directory: ./anycode-backend
        run: |
          if [ ! -d "dist" ] || [ -z "$(ls -A dist)" ]; then
            echo "Error: dist directory is empty or missing"
            exit 1
          fi
          echo "Frontend build verified:"
          ls -la dist | head -10
          echo "Total files: $(find dist -type f | wc -l)"
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0
      
      - name: Add musl target
        run: rustup target add x86_64-unknown-linux-musl
      
      - name: Install musl toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
      
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            anycode-backend -> target
      
      - name: Build Linux x86_64 musl binary (test)
        working-directory: ./anycode-backend
        run: cargo build --release --target x86_64-unknown-linux-musl
      
      - name: Check binary size
        working-directory: ./anycode-backend
        run: |
          ls -lh target/x86_64-unknown-linux-musl/release/anycode
          file target/x86_64-unknown-linux-musl/release/anycode
      
      - name: Test binary help
        working-directory: ./anycode-backend
        run: |
          ./target/x86_64-unknown-linux-musl/release/anycode --help
